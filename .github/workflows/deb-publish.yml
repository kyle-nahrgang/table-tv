name: Build and Publish Debian Package

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Node.js for npm build
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Optional: install dependencies
      - name: Install npm dependencies
        run: npm install
        working-directory: ./ui

      # Install cargo-deb
      - name: Install cargo-deb
        run: cargo install cargo-deb

      # Build the Rust project, runs build.rs automatically
      - name: Build .deb package
        run: cargo deb
        working-directory: ./api

      # Deploy
      - name: Upload .deb to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_FILE=$(ls target/debian/*.deb)
          echo "Uploading $PACKAGE_FILE"
          curl -u ${{ github.actor }}:$GITHUB_TOKEN \
            --upload-file "$PACKAGE_FILE" \
            "https://apt.pkg.github.com/${{ github.repository_owner }}/${{ github.repository }}/"


      - name: Verify package
        run: ls -l target/debian/