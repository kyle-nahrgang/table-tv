services:
  table-tv:
    build:
      context: .
      dockerfile: Dockerfile
      target: table-tv
    platform: linux/amd64  # polodb_core fails on ARM; amd64 runs via QEMU emulation on Apple Silicon
    ports:
      - "80:80"
    hostname: table-tv
    volumes:
      - table-tv-data:/app/data

volumes:
  table-tv-data:
